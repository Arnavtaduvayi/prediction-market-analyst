name: Paper Trading — Weekly Target Refresh

on:
  # Schedule disabled — VPS predmkt-targets.timer handles weekly refresh.
  # schedule:
  #   - cron: '37 12 * * 0'
  workflow_dispatch: {}

jobs:
  targets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Refresh whale targets
        run: python3 targets.py --candidates 150
        continue-on-error: true

      - name: Commit target list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/targets.json data/wallet_cache/ 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "targets: weekly refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No target changes."
          fi
