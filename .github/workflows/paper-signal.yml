name: Paper Trading — Hourly Signal Capture

on:
  schedule:
    # Hourly at :07 — full pipeline (scanner → brain → executor).
    # Brain's whale check refetches recent target-wallet trades each run,
    # so this also gives us hourly whale activity monitoring.
    # Staggered from exit-monitor at :23 to avoid concurrent commits.
    - cron: '7 * * * *'
  workflow_dispatch: {}

jobs:
  signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests cryptography

      - name: Run signal capture
        run: python3 paper_cross.py signal
        continue-on-error: true

      - name: Show status
        run: python3 paper_cross.py status

      - name: Commit journal updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper_cross_trades.json paper_disposition_trades.json paper_calendar_trades.json paper_spot_trades.json paper_flow_trades.json data/disposition_signals.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "paper: signal capture $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No journal changes to commit."
          fi
